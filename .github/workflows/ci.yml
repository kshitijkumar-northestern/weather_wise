name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: Build & unit tests (iOS Simulator)
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Prefer the newest Xcode on the image (newest SDK, e.g. iOS 26 for the
      # Liquid Glass design system) but fall back to the default toolchain if
      # the selection fails. Never pin exact versions: runner images vary.
      - name: Select newest available Xcode
        run: |
          NEWEST=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          if [ -n "$NEWEST" ]; then
            echo "Selecting $NEWEST"
            sudo xcode-select -s "$NEWEST/Contents/Developer"
          fi
          xcodebuild -version

      - name: Ensure iOS simulator runtime is installed
        run: |
          if ! xcrun simctl list devices available | grep -q "iPhone"; then
            echo "No iPhone simulators available; downloading iOS platform..."
            sudo xcodebuild -downloadPlatform iOS
          fi

      - name: Pick an available iPhone simulator
        id: sim
        run: |
          UDID=$(xcrun simctl list devices available --json \
            | jq -r '[.devices | to_entries[] | select(.key | contains("iOS")) | .value[] | select(.isAvailable and (.name | startswith("iPhone")))] | first | .udid // empty')
          if [ -z "$UDID" ]; then
            echo "No available iPhone simulator found" >&2
            xcrun simctl list devices >&2
            exit 1
          fi
          echo "Using simulator $UDID"
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"

      - name: Create placeholder Secrets.plist
        run: cp WeatherWise/Secrets.example.plist WeatherWise/Secrets.plist

      - name: Run unit tests
        run: |
          xcodebuild test \
            -project WeatherWise.xcodeproj \
            -scheme WeatherWise \
            -destination "platform=iOS Simulator,id=${{ steps.sim.outputs.udid }}" \
            -only-testing:WeatherWiseTests \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=""
