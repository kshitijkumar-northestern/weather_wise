name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: Build & unit tests (iOS Simulator)
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Create placeholder Secrets.plist
        run: cp WeatherWise/Secrets.example.plist WeatherWise/Secrets.plist

      - name: Run unit tests
        run: |
          xcodebuild test \
            -project WeatherWise.xcodeproj \
            -scheme WeatherWise \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -only-testing:WeatherWiseTests \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=""
